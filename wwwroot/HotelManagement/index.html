<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" /><meta content="width=device-width,initial-scale=1.0" name="viewport" />
  <title>Login | The Ethereal Concierge</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <style>
    body{font-family:'Manrope',sans-serif;background:#fbf9f4;}
    .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24;}
    .luxury-gradient{background:linear-gradient(135deg,#4f645b 0%,#43574f 100%);}
    .form-focus:focus{outline:none;box-shadow:0 0 0 2px rgba(79,100,91,.35);}
    /* Notification */
    @keyframes toastIn {from{transform:translateX(110%) scale(.95);opacity:0}to{transform:translateX(0) scale(1);opacity:1}}
    @keyframes toastOut{from{transform:translateX(0) scale(1);opacity:1}to{transform:translateX(110%) scale(.95);opacity:0}}
    .toast-in {animation:toastIn  .38s cubic-bezier(.22,1,.36,1) forwards;}
    .toast-out{animation:toastOut .28s cubic-bezier(.55,0,1,.45)  forwards;}
    @keyframes toastProgress{from{width:100%}to{width:0%}}
    .toast-progress{animation:toastProgress linear forwards;}
    /* Spinner */
    @keyframes spin{to{transform:rotate(360deg)}}
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(231,254,243,.35);border-top-color:#e7fef3;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px;}
    /* Shake */
    @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
    .shake{animation:shake .4s ease;}
    .pw-btn{position:absolute;right:16px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#7a7b75;display:flex;align-items:center;transition:color .2s;}
    .pw-btn:hover{color:#4f645b;}
  </style>
</head>
<body style="color:#31332e;" class="antialiased overflow-hidden">

<!-- NOTIFICATION STACK -->
<div id="notifStack" class="fixed top-5 right-5 z-[200] flex flex-col gap-2.5 pointer-events-none" style="width:340px"></div>

<main class="min-h-screen flex flex-col md:flex-row">
  <!-- Left visual -->
  <section class="hidden md:flex md:w-1/2 lg:w-3/5 relative overflow-hidden" style="background:#d1e8dd">
    <div class="absolute inset-0">
      <img alt="Hotel" class="w-full h-full object-cover opacity-90" style="mix-blend-mode:multiply"
           src="https://images8.alphacoders.com/138/1386921.png" />
    </div>
    <div class="relative z-10 flex flex-col justify-between p-16 w-full" style="color:#2f433c">
      <span class="text-xl font-bold tracking-tighter">The Ethereal Concierge</span>
      <div class="max-w-md">
        <h2 class="text-5xl font-extrabold tracking-tight leading-tight mb-6">Your Sanctuary Awaits.</h2>
        <p class="text-lg font-light leading-relaxed opacity-80">Experience the art of mindful hospitality where every detail is curated for your absolute serenity.</p>
      </div>
      <div class="flex items-center gap-4">
        <div class="h-px w-12 opacity-30" style="background:#2f433c"></div>
        <span class="text-xs tracking-[.2em] uppercase opacity-70">Est. 2024</span>
      </div>
    </div>
  </section>

  <!-- Right: form -->
  <section class="w-full md:w-1/2 lg:w-2/5 flex items-center justify-center p-8 md:p-12 lg:p-24" style="background:#fbf9f4">
    <div class="w-full max-w-md space-y-10">
      <header class="text-center md:text-left">
        <h1 class="text-3xl font-extrabold tracking-tight mb-2">Welcome Back</h1>
        <p style="color:#5e6059" class="font-light tracking-wide">Nhập thông tin để truy cập hệ thống.</p>
      </header>

      <form id="loginForm" class="space-y-5" novalidate>
        <div class="space-y-1.5">
          <label class="block text-[10px] tracking-[.15em] font-bold uppercase ml-1" style="color:#5e6059">Email</label>
          <input id="f_email" type="email" placeholder="admin@hotel.com" autocomplete="email"
                 class="w-full rounded-xl py-4 px-6 text-sm border border-transparent transition-all form-focus"
                 style="background:rgba(227,227,219,.5);color:#31332e" />
          <p id="err_email" class="hidden text-xs ml-1" style="color:#a83836"></p>
        </div>

        <div class="space-y-1.5">
          <div class="flex justify-between items-center ml-1">
            <label class="text-[10px] tracking-[.15em] font-bold uppercase" style="color:#5e6059">Mật khẩu</label>
            <a href="#" class="text-[10px] font-bold transition-colors" style="color:#4f645b">Quên mật khẩu?</a>
          </div>
          <div class="relative">
            <input id="f_password" type="password" placeholder="••••••••" autocomplete="current-password"
                   class="w-full rounded-xl py-4 px-6 pr-14 text-sm border border-transparent transition-all form-focus"
                   style="background:rgba(227,227,219,.5);color:#31332e" />
            <button type="button" id="pwToggle" class="pw-btn" aria-label="Hiện/ẩn mật khẩu">
              <span class="material-symbols-outlined" id="pwIcon" style="font-size:20px">visibility_off</span>
            </button>
          </div>
          <p id="err_password" class="hidden text-xs ml-1" style="color:#a83836"></p>
        </div>

        <div class="flex items-center gap-3 px-1">
          <input id="f_remember" type="checkbox" class="w-5 h-5 rounded" style="accent-color:#4f645b" />
          <label for="f_remember" class="text-sm font-medium select-none" style="color:#5e6059">Ghi nhớ đăng nhập</label>
        </div>

        <div id="errBanner" class="hidden rounded-xl px-4 py-3 flex items-start gap-2.5"
             style="background:rgba(168,56,54,.1);border:1px solid rgba(168,56,54,.25)">
          <span class="material-symbols-outlined mt-0.5" style="font-size:18px;color:#a83836;font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 20">error</span>
          <p id="errBannerText" class="text-sm font-medium leading-snug" style="color:#a83836"></p>
        </div>

        <button id="submitBtn" type="submit"
                class="w-full luxury-gradient rounded-full py-4 font-bold tracking-widest uppercase text-xs
                       shadow-lg transition-all duration-300 active:scale-[.98] disabled:opacity-60 flex items-center justify-center"
                style="color:#e7fef3">
          <span id="btnLabel">Đăng nhập</span>
        </button>
      </form>

      <footer class="text-center">
        <p class="text-sm font-medium" style="color:#5e6059">
          Chưa có tài khoản?
          <a href="#" class="font-bold ml-1 hover:underline underline-offset-4" style="color:#4f645b">Tạo tài khoản</a>
        </p>
      </footer>
    </div>
  </section>
</main>

<script>
const API_BASE='http://localhost:5279';
const KEYS={token:'hm_access_token',refresh:'hm_refresh_token',user:'hm_user',email:'hm_remember_email'};

/* ═══════════════════════════════════════
   NOTIFICATION SYSTEM
   Backend Notification: { userId, type, action, message, createdAt, isRead }
   NotificationType : Success | Error | Warning | Info
   NotificationAction: LoginAccount | CreateAccount | UpdateAccount
                        ResetPassword | LockAccount | UnlockAccount
═══════════════════════════════════════ */
const NOTIF_TYPES={
  Success:{bg:'#1e3a2f',border:'#2d5a45',text:'#a7f3d0',progress:'#34d399',icon:'check_circle'},
  Error:  {bg:'#3a1e1e',border:'#5a2d2d',text:'#fca5a5',progress:'#f87171',icon:'error'},
  Warning:{bg:'#3a2e1a',border:'#5a4820',text:'#fcd34d',progress:'#fbbf24',icon:'warning'},
  Info:   {bg:'#1e2f3a',border:'#2d4a5a',text:'#93c5fd',progress:'#60a5fa',icon:'info'},
};
const NOTIF_ACTIONS={
  LoginAccount:  {label:'Đăng nhập',    icon:'login'},
  CreateAccount: {label:'Tạo tài khoản',icon:'person_add'},
  UpdateAccount: {label:'Cập nhật',     icon:'edit'},
  ResetPassword: {label:'Đổi mật khẩu',icon:'lock_reset'},
  LockAccount:   {label:'Khóa TK',     icon:'lock'},
  UnlockAccount: {label:'Mở khóa TK',  icon:'lock_open'},
};

function showNotification(notif, duration=4500){
  if(!notif)return;
  const tc=NOTIF_TYPES[notif.type]||NOTIF_TYPES.Info;
  const ac=NOTIF_ACTIONS[notif.action]||{};
  const stack=document.getElementById('notifStack');
  const el=document.createElement('div');
  el.style.cssText=`background:${tc.bg};border:1px solid ${tc.border};color:${tc.text};`;
  el.className='pointer-events-auto rounded-2xl overflow-hidden shadow-2xl toast-in';
  el.dataset.notif='1';
  el.innerHTML=`
    <div style="padding:14px 14px 10px;display:flex;align-items:flex-start;gap:10px">
      <span class="material-symbols-outlined" style="font-size:20px;flex-shrink:0;margin-top:1px;font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 20">${tc.icon}</span>
      <div style="flex:1;min-width:0">
        ${ac.label?`<div style="display:flex;align-items:center;gap:5px;margin-bottom:2px;opacity:.6">
          <span class="material-symbols-outlined" style="font-size:11px">${ac.icon}</span>
          <span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em">${ac.label}</span>
        </div>`:''}
        <p style="font-size:13px;font-weight:600;line-height:1.4">${escHtml(notif.message||'')}</p>
        ${notif.createdAt?`<p style="font-size:10px;opacity:.45;margin-top:3px">${fmtTime(notif.createdAt)}</p>`:''}
      </div>
      <button onclick="dismissNotif(this.closest('[data-notif]'))"
              style="flex-shrink:0;background:none;border:none;cursor:pointer;opacity:.5;padding:2px;border-radius:4px"
              onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=.5">
        <span class="material-symbols-outlined" style="font-size:15px;color:inherit">close</span>
      </button>
    </div>
    <div style="height:3px;margin:0 12px 10px;border-radius:9999px;overflow:hidden;opacity:.5;background:rgba(255,255,255,.1)">
      <div class="toast-progress" style="height:100%;background:${tc.progress};animation-duration:${duration}ms;border-radius:9999px"></div>
    </div>`;
  stack.appendChild(el);
  const t=setTimeout(()=>dismissNotif(el),duration);
  el._timer=t;
}
function showRawNotif(message,type='Info',action=null){
  showNotification({type,action,message,createdAt:new Date().toISOString()});
}
function dismissNotif(el){
  if(!el||el._dismissed)return;
  el._dismissed=true;clearTimeout(el._timer);
  el.classList.replace('toast-in','toast-out');
  setTimeout(()=>el.remove(),300);
}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtTime(iso){try{return new Date(iso).toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'});}catch{return '';}}

/* DOM */
const fEmail=document.getElementById('f_email'),fPw=document.getElementById('f_password'),
      fRemember=document.getElementById('f_remember'),submitBtn=document.getElementById('submitBtn'),
      btnLabel=document.getElementById('btnLabel'),errEmail=document.getElementById('err_email'),
      errPw=document.getElementById('err_password'),errBanner=document.getElementById('errBanner'),
      errBannerTx=document.getElementById('errBannerText'),pwToggle=document.getElementById('pwToggle'),
      pwIcon=document.getElementById('pwIcon');

const saved=localStorage.getItem(KEYS.email);
if(saved){fEmail.value=saved;fRemember.checked=true;}

pwToggle.addEventListener('click',()=>{
  const show=fPw.type==='password';fPw.type=show?'text':'password';
  pwIcon.textContent=show?'visibility':'visibility_off';
});

[fEmail,fPw].forEach(el=>el.addEventListener('input',()=>{
  errBanner.classList.add('hidden');
  el===fEmail?errEmail.classList.add('hidden'):errPw.classList.add('hidden');
  el.style.border='1px solid transparent';el.style.background='rgba(227,227,219,.5)';
}));

function validate(){
  let ok=true;
  const setErr=(el,errEl,msg)=>{
    errEl.textContent=msg;errEl.classList.remove('hidden');
    el.style.border='1px solid rgba(168,56,54,.6)';el.style.background='rgba(168,56,54,.05)';
    ok=false;
  };
  errEmail.classList.add('hidden');errPw.classList.add('hidden');errBanner.classList.add('hidden');
  fEmail.style.border='1px solid transparent';fEmail.style.background='rgba(227,227,219,.5)';
  fPw.style.border   ='1px solid transparent';fPw.style.background   ='rgba(227,227,219,.5)';
  const em=fEmail.value.trim(),pw=fPw.value;
  if(!em)setErr(fEmail,errEmail,'Email không được để trống.');
  else if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em))setErr(fEmail,errEmail,'Email không hợp lệ.');
  if(!pw)setErr(fPw,errPw,'Mật khẩu không được để trống.');
  return ok;
}

function setLoading(on){
  submitBtn.disabled=on;
  btnLabel.innerHTML=on?'<span class="spinner"></span>Đang xác thực…':'Đăng nhập';
}

document.getElementById('loginForm').addEventListener('submit',async(e)=>{
  e.preventDefault();
  if(!validate()){
    const form=document.getElementById('loginForm');
    form.classList.add('shake');form.addEventListener('animationend',()=>form.classList.remove('shake'),{once:true});
    return;
  }
  setLoading(true);
  try{
    const res=await fetch(`${API_BASE}/api/Auth/login`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email:fEmail.value.trim(),password:fPw.value}),
    });
    const data=await res.json().catch(()=>({}));
    if(!res.ok) throw{status:res.status,data};

    /* ★ Hiển thị notification từ backend */
    if(data.notification){
      showNotification(data.notification, 2800);
    } else {
      showRawNotif(`Chào mừng, ${data.fullName}!`,'Success','LoginAccount');
    }

    /* Lưu auth */
    const store=localStorage;
    store.setItem(KEYS.token,data.token);
    store.setItem(KEYS.refresh,data.refreshToken);
    store.setItem(KEYS.user,JSON.stringify({userId:data.userId,fullName:data.fullName,email:data.email,role:data.role,avatarUrl:data.avatarUrl,permissions:data.permissions}));
    if(fRemember.checked)localStorage.setItem(KEYS.email,data.email);
    else localStorage.removeItem(KEYS.email);

    setTimeout(()=>window.location.href='UserManagement.html',1100);
  }catch(err){
    setLoading(false);
    if(err.status===401){
      const msg=err.data?.message||'Email hoặc mật khẩu không đúng.';
      /* ★ Notification lỗi đăng nhập */
      showNotification({type:'Error',action:'LoginAccount',message:msg,createdAt:new Date().toISOString()});
      errBannerTx.textContent=msg;errBanner.classList.remove('hidden');
      fEmail.style.border='1px solid rgba(168,56,54,.6)';fEmail.style.background='rgba(168,56,54,.05)';
      fPw.style.border   ='1px solid rgba(168,56,54,.6)';fPw.style.background   ='rgba(168,56,54,.05)';
      const form=document.getElementById('loginForm');
      form.classList.add('shake');form.addEventListener('animationend',()=>form.classList.remove('shake'),{once:true});
    } else if(!err.status){
      showRawNotif('Không thể kết nối máy chủ. Kiểm tra lại kết nối mạng.','Error');
    } else {
      showRawNotif(err.data?.message||`Lỗi máy chủ (${err.status})`,'Error');
    }
  }
});
</script>
</body>
</html>
