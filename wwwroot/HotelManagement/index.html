<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login | The Ethereal Concierge</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap"

    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4f645b",
                        "secondary-fixed": "#ffdad9",
                        "on-primary-container": "#42564e",
                        "on-tertiary-container": "#5f554d",
                        "secondary-fixed-dim": "#fac8c8",
                        "primary-fixed": "#d1e8dd",
                        "on-secondary-fixed-variant": "#775252",
                        "on-primary": "#e7fef3",
                        "tertiary": "#675d55",
                        "error-container": "#fa746f",
                        "tertiary-fixed-dim": "#e8dacf",
                        "on-error": "#fff7f6",
                        "on-tertiary-fixed-variant": "#695f56",
                        "on-tertiary-fixed": "#4c433b",
                        "surface-container": "#efeee7",
                        "outline-variant": "#b2b2ab",
                        "inverse-primary": "#e7fff3",
                        "surface-container-highest": "#e3e3db",
                        "inverse-on-surface": "#9e9d99",
                        "secondary-dim": "#6e494a",
                        "on-background": "#31332e",
                        "tertiary-container": "#f7e8dd",
                        "on-secondary-container": "#6d4849",
                        "on-primary-fixed": "#2f433c",
                        "outline": "#7a7b75",
                        "primary-fixed-dim": "#c3dacf",
                        "on-tertiary": "#fff7f3",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-high": "#e9e8e1",
                        "error-dim": "#67040d",
                        "secondary-container": "#ffdad9",
                        "on-surface-variant": "#5e6059",
                        "on-secondary-fixed": "#583637",
                        "surface-container-low": "#f5f4ed",
                        "primary-dim": "#43574f",
                        "tertiary-fixed": "#f7e8dd",
                        "tertiary-dim": "#5b5149",
                        "surface": "#fbf9f4",
                        "surface-bright": "#fbf9f4",
                        "primary-container": "#d1e8dd",
                        "background": "#fbf9f4",
                        "inverse-surface": "#0e0e0c",
                        "on-secondary": "#fff7f6",
                        "on-error-container": "#6e0a12",
                        "surface-variant": "#e3e3db",
                        "surface-tint": "#4f645b",
                        "secondary": "#7b5556",
                        "surface-dim": "#dadad2",
                        "on-primary-fixed-variant": "#4b6057",
                        "on-surface": "#31332e",
                        "error": "#a83836"
                    },
                    fontFamily: {
                        "headline": ["Manrope", "sans-serif"],
                        "body": ["Manrope", "sans-serif"],
                        "label": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }

    <style>
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #fbf9f4;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }

        .form-input-focus:focus {
            box-shadow: 0 0 0 1px rgba(79, 100, 91, 0.4);
        }

        .luxury-gradient {
            background: linear-gradient(135deg, #4f645b 0%, #43574f 100%);
        }
    </style>
</head>

<body class="bg-surface text-on-surface antialiased overflow-hidden">
    <main class="min-h-screen flex flex-col md:flex-row">
        <!-- Left Side: Serene Visual -->
        <section class="hidden md:flex md:w-1/2 lg:w-3/5 relative overflow-hidden bg-primary-fixed">
            <div class="absolute inset-0 z-0">
                <img alt="Serene Hotel Interior" class="w-full h-full object-cover opacity-90 mix-blend-multiply"
                    data-alt="Serene minimal hotel interior with soft morning light"
                    src="https://images8.alphacoders.com/138/1386921.png" />
            </div>
            <!-- Branding Overlay -->
            <div class="relative z-10 flex flex-col justify-between p-16 w-full text-on-primary-fixed">
                <div>
                    <span class="text-xl font-bold tracking-tighter">The Ethereal Concierge</span>
                </div>
                <div class="max-w-md">
                    <h2 class="text-5xl font-extrabold tracking-tight leading-tight mb-6">Your Sanctuary Awaits.</h2>
                    <p class="text-lg font-light leading-relaxed opacity-80">Experience the art of mindful hospitality
                        where every detail is curated for your absolute serenity.</p>
                </div>
                <div class="flex items-center gap-4">
                    <div class="h-[1px] w-12 bg-on-primary-fixed-variant opacity-40"></div>
                    <span class="text-xs tracking-[0.2em] uppercase">Est. 2024</span>
                </div>
            </div>
        </section>
        <!-- Right Side: Login Form -->
        <section class="w-full md:w-1/2 lg:w-2/5 flex items-center justify-center p-8 md:p-12 lg:p-24 bg-surface">
            <div class="w-full max-w-md space-y-10">
                <!-- Header -->
                <header class="text-center md:text-left">
                    <h1 class="text-3xl font-extrabold tracking-tight text-on-surface mb-2">Welcome Back</h1>
                    <p class="text-on-surface-variant font-light tracking-wide">Please enter your details to access your
                        retreat.</p>
                </header>
                <!-- Action Area -->
                <div class="space-y-6">
                    <!-- Google Auth -->
                    <!-- Divider -->
                    <!-- Manual Login Form -->
                    <form class="space-y-5">
                        <div class="space-y-2">
                            <label
                                class="text-[10px] tracking-[0.15em] font-bold text-on-surface-variant uppercase ml-1"
                                for="email">Username or Email</label>
                            <input
                                class="w-full bg-surface-container-highest/50 border-none rounded-xl py-4 px-6 text-on-surface placeholder:text-outline/50 form-input-focus transition-all duration-300"
                                id="email" placeholder="Enter your email address" type="email" />
                        </div>
                        <div class="space-y-2">
                            <div class="flex justify-between items-center ml-1">
                                <label class="text-[10px] tracking-[0.15em] font-bold text-on-surface-variant uppercase"
                                    for="password">Password</label>
                                <a class="text-[10px] font-bold text-primary hover:text-primary-dim transition-colors"
                                    href="#">Forgot?</a>
                            </div>
                            <input
                                class="w-full bg-surface-container-highest/50 border-none rounded-xl py-4 px-6 text-on-surface placeholder:text-outline/50 form-input-focus transition-all duration-300"
                                id="password" placeholder="••••••••" type="password" />
                        </div>
                        <!-- Checkbox -->
                        <div class="flex items-center gap-3 px-1">
                            <div class="relative flex items-center">
                                <input
                                    class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary/20 bg-surface"
                                    id="remember" type="checkbox" />
                            </div>
                            <label class="text-sm text-on-surface-variant font-medium select-none"
                                for="remember">Remember me</label>
                        </div>
                        <!-- Submit Button -->
                        <button
                            class="w-full luxury-gradient text-on-primary py-4 rounded-full font-bold tracking-widest uppercase text-xs shadow-lg shadow-primary/10 hover:shadow-primary/20 transition-all duration-300 active:scale-[0.98]"
                            type="submit">
                            Sign In
                        </button>
                    </form>
                </div>
                <!-- Footer -->
                <footer class="text-center pt-4">
                    <p class="text-sm text-on-surface-variant font-medium">
                        Don't have an account?
                        <a class="text-primary font-bold ml-1 hover:underline underline-offset-4 decoration-2"
                            href="#">Create an account</a>
                    </p>
                </footer>
            </div>
        </section>
    </main>
    <!-- Global Layout Decorative Elements -->
    <div class="fixed top-8 left-8 md:top-12 md:left-12 pointer-events-none md:hidden">
        <span class="text-lg font-bold tracking-tighter text-on-surface">The Ethereal Concierge</span>
    </div>
</body>

</html>
